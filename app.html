<!DOCTYPE html>
    <html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <link rel="stylesheet" href="fonts/fonts.css">
    
    <script src="react.production.min.js"></script>
    <script src="react-dom.production.min.js"></script>

    <link rel="stylesheet" href="styles.css">
    <script src="utils.js"></script>
    <script src="components.js"></script>
    <script src="InsightStrip.js"></script>
    <script src="DashboardOverview.js"></script>
    <script src="EmptyState.js"></script>
    <script src="SettingGroup.js"></script>
    <script src="finance.js"></script>
    <script src="selectors.js"></script>
    <script src="actions.js"></script>
    <script src="walleticons.js"></script>
    <script src="persistence.js"></script>
    <script src="license.js"></script>
    <script src="photodb.js"></script>
    <script src="archivedb.js"></script>
    <script src="constants.js"></script>
    <script src="CoreComponents.js"></script>
    <script src="PhotoDiaryView.js"></script>
    <script src="SettingsView.js"></script>
    <script src="WalletsView.js"></script>
    <script src="BudgetBillsView.js"></script>
    <script src="DailyExpensesView.js"></script>
    <script src="SinkingFundsView.js"></script>
    <script src="AllTransactionsView.js"></script>
    <script src="HistoryView.js"></script>
    <script src="BudgetLimitsView.js"></script>
    <script src="RecentActivitySection.js"></script>
    <script src="OnboardingScreen.js"></script>
    <script src="UndoToast.js"></script>
    <script src="HelpTooltip.js"></script>
    <script src="crashreport.js"></script>
    <script src="DebtView.js"></script>
    <script src="CashflowView.js"></script>
    <script src="PeraReportView.js"></script>
    <script src="CashflowView.js"></script>

        <link rel="apple-touch-icon" href="logosinkpeso.png">
    <link rel="icon" href="logosinkpeso.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020810">
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useMemo, useEffect, useRef, useCallback } = React;
        const e = React.createElement;

        // ── Style tokens + Z-index from constants.js ─────────────────────────
        const S = window.SINKPESO_S;
        const Z = window.SINKPESO_Z;

        // ── Icon + Icon paths loaded from constants.js ──────────────────────
        const ICONS = window.SINKPESO_ICONS;
        const Icon = window.SINKPESO_Icon;

        // Vault icons, categories, currencies — all from constants.js
        const { FUND_ICONS, resolveVaultIcon, CATEGORIES, CURRENCIES, EXCHANGE_RATES, WALLET_COLORS, CASH_WALLET_ID, CASH_WALLET } = window.SINKPESO_CONSTANTS;

        // ── RESOLVE GLOBALS ───────────────────────────────────────────────────
        // Pull utils, UI primitives and external components from their own files.
        // Keeps this file thin; avoids re-defining what is already loaded.
        const { tc, uid, todayStr, safeDiv, addMonths, getDaysRemaining } = window.utils;
        const { SLabel, PageTitle, PBar, Field, Inp, Sel, Btn } = window.components;
        const EmptyState = window.EmptyState;



        // ── Components loaded from CoreComponents.js via window.* ──────────────
        const VirtualList = window.VirtualList;
        const DotMenu = window.DotMenu;
        const WalletPicker = window.WalletPicker;
        const IncomeSourcePicker = window.IncomeSourcePicker;
        const LicenseInput = window.LicenseInput;
        const UpgradePromptModal = window.UpgradePromptModal;
        const QuickAddModal = window.QuickAddModal;
        const PinScreen = window.PinScreen;
        const ErrorBoundary = window.ErrorBoundary;

        // Export shared globals for external view files (they can't see block-scoped const)
        window.S = S;
        window.Z = Z;
        window.CASH_WALLET_ID = CASH_WALLET_ID;
        window.WALLET_COLORS = WALLET_COLORS;
        window.FUND_ICONS = FUND_ICONS;
        window.resolveVaultIcon = resolveVaultIcon;
        window.CATEGORIES = CATEGORIES;
        window.DotMenu = DotMenu;
        window.WalletPicker = WalletPicker;
        window.EmptyState = EmptyState;
        window.Icon = Icon;
        window.IncomeSourcePicker = IncomeSourcePicker;
        window.UpgradePromptModal = UpgradePromptModal;

        // WalletsView loaded from WalletsView.js (window.WalletsView)
        const WalletsView = window.WalletsView || React.memo(function WalletsView_FALLBACK() { return e('div', null, 'WalletsView.js not loaded'); });

        // InsufficientBalanceModal loaded from DailyExpensesView.js (window.InsufficientBalanceModal)
        const InsufficientBalanceModal = window.InsufficientBalanceModal || function() { return null; };

        // PhotoDiaryView is now loaded from PhotoDiaryView.js (window.PhotoDiaryView)

        // ── CORE APPLICATION ──────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("dashboard");
            const [showOnboarding, setShowOnboarding] = useState(() => {
                try { return window.shouldShowOnboarding && window.shouldShowOnboarding(); } catch(e) { return false; }
            });
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [deferredInstallPrompt, setDeferredInstallPrompt] = useState(null);
            const [showInstallBanner, setShowInstallBanner] = useState(false);
            const [showIOSGuide, setShowIOSGuide] = useState(false);
            const [dismissedIOSBanner, setDismissedIOSBanner] = useState(false);
            // Detect iOS Safari (no beforeinstallprompt support)
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

            // Offline/online detection
            useEffect(() => {
                const goOffline = () => setIsOffline(true);
                const goOnline = () => setIsOffline(false);
                window.addEventListener("offline", goOffline);
                window.addEventListener("online", goOnline);
                return () => { window.removeEventListener("offline", goOffline); window.removeEventListener("online", goOnline); };
            }, []);

            // Install prompt capture
            useEffect(() => {
                const handler = (ev) => {
                    ev.preventDefault();
                    setDeferredInstallPrompt(ev);
                    setShowInstallBanner(true);
                };
                window.addEventListener("beforeinstallprompt", handler);
                return () => window.removeEventListener("beforeinstallprompt", handler);
            }, []);

            useEffect(() => { window.scrollTo(0, 0); }, [tab]);

            const [saved] = useState(() => window.persistence.loadState());
            const defaultSettings = { currency: 'PHP', secondaryCurrency: '', theme: 'dark', pin: '' };
            const [settings, setSettings] = useState(() => ({ ...defaultSettings, ...saved.settings }));
            const [isUnlocked, setIsUnlocked] = useState(!settings.pin);

            const [funds, setFunds] = useState(saved.funds);
            const [txns, setTxns] = useState(saved.txns);
            const [incomes, setIncomes] = useState(saved.incomes);
            const [bills, setBills] = useState(saved.bills);
            const [dailyExpenses, setDailyExpenses] = useState(saved.daily);
            const [archives, setArchives] = useState([]);
            const [archivesLoaded, setArchivesLoaded] = useState(false);
            const [budgets, setBudgets] = useState(saved.budgets);
            const [photoDiary, setPhotoDiary] = useState([]);
            const [photoDiaryLoaded, setPhotoDiaryLoaded] = useState(false);
            const [templates, setTemplates] = useState(saved.templates);
            const [debts, setDebts] = useState(saved.debts);

            // Load archives from IndexedDB on mount, with localStorage migration
            useEffect(() => {
                window.archivedb.open().then(() => {
                    return window.archivedb.migrateFromLS();
                }).then(() => {
                    return window.archivedb.getAll();
                }).then(entries => {
                    setArchives(entries || []);
                    setArchivesLoaded(true);
                }).catch(err => {
                    console.warn("[app] IndexedDB archive load failed, falling back to localStorage:", err);
                    try { setArchives(JSON.parse(localStorage.getItem("sp_archives")) || []); } catch { setArchives([]); }
                    setArchivesLoaded(true);
                });
            }, []);

            // Load photo diary from IndexedDB on mount, with localStorage migration
            useEffect(() => {
                window.photodb.open().then(() => {
                    return window.photodb.migrateFromLS();
                }).then(() => {
                    return window.photodb.getAll();
                }).then(entries => {
                    // Orphan detection: remove photo diary entries whose expenseId no longer exists
                    const validExpenseIds = new Set(saved.daily.map(d => d.id));
                    const cleaned = (entries || []).filter(p => !p.expenseId || validExpenseIds.has(p.expenseId));
                    if (cleaned.length < (entries || []).length) {
                        console.warn("[photodb] Removed " + ((entries || []).length - cleaned.length) + " orphaned photo diary entries");
                        window.photodb.saveAll(cleaned).catch(() => {});
                    }
                    setPhotoDiary(cleaned);
                    setPhotoDiaryLoaded(true);
                }).catch(err => {
                    console.warn("[app] IndexedDB photo load failed, falling back to localStorage:", err);
                    try { setPhotoDiary(JSON.parse(localStorage.getItem("sp_photo_diary")) || []); } catch { setPhotoDiary([]); }
                    setPhotoDiaryLoaded(true);
                });
            }, []);
            const [wallets, setWallets] = useState(() => {
                const w = saved.wallets;
                const withCash = w.find(x => x.id === CASH_WALLET_ID) ? w : [CASH_WALLET, ...w];
                return window.finance.migrateWallets(withCash, { incomes, bills, dailyExpenses, txns });
            });

            // Sync states to LocalStorage & Apply Theme
            useEffect(() => {
                window.persistence.saveKey("settings", settings);
                document.documentElement.setAttribute('data-theme', settings.theme);
            }, [settings]);
            useEffect(() => { window.persistence.saveKey("funds", funds); }, [funds]);
            useEffect(() => { window.persistence.saveKey("txns", txns); }, [txns]);
            useEffect(() => { window.persistence.saveKey("incomes", incomes); }, [incomes]);
            useEffect(() => { window.persistence.saveKey("bills", bills); }, [bills]);
            useEffect(() => { window.persistence.saveKey("daily", dailyExpenses); }, [dailyExpenses]);
            // Persist archives to IndexedDB (not localStorage — snapshots are large)
            useEffect(() => {
                if (!archivesLoaded) return;
                const timer = setTimeout(() => {
                    window.archivedb.saveAll(archives).catch(err => {
                        console.warn("[app] IndexedDB archive save failed:", err);
                        try { localStorage.setItem("sp_archives", JSON.stringify(archives)); } catch(e) {}
                    });
                }, 300);
                return () => clearTimeout(timer);
            }, [archives, archivesLoaded]);
            useEffect(() => { window.persistence.saveKey("budgets", budgets); }, [budgets]);
            // Persist photo diary to IndexedDB (not localStorage — too large for photos)
            useEffect(() => {
                if (!photoDiaryLoaded) return; // skip initial empty state before IDB loads
                // Debounce: only save after 300ms of no changes
                const timer = setTimeout(() => {
                    window.photodb.saveAll(photoDiary).catch(err => {
                        console.warn("[app] IndexedDB photo save failed:", err);
                        // Fallback: try localStorage (may hit quota)
                        try { localStorage.setItem("sp_photo_diary", JSON.stringify(photoDiary)); } catch(e) { /* quota exceeded */ }
                    });
                }, 300);
                return () => clearTimeout(timer);
            }, [photoDiary, photoDiaryLoaded]);
            useEffect(() => { window.persistence.saveKey("wallets", wallets); }, [wallets]);
            useEffect(() => { window.persistence.saveKey("templates", templates); }, [templates]);
            useEffect(() => { window.persistence.saveKey("debts", debts); }, [debts]);

            // Currency Formatter bound to state
            const fc = useMemo(() => {
                return (c) => new Intl.NumberFormat("en-PH", CURRENCIES[settings.currency] || CURRENCIES.PHP).format((Number(c) || 0) / 100);
            }, [settings.currency]);

            // Secondary currency formatter (optional)
            const fc2 = useMemo(() => {
                if (!settings.secondaryCurrency || settings.secondaryCurrency === settings.currency) return null;
                const rate = (EXCHANGE_RATES[settings.secondaryCurrency] || 1) / (EXCHANGE_RATES[settings.currency] || 1);
                return (c) => new Intl.NumberFormat("en-PH", CURRENCIES[settings.secondaryCurrency] || CURRENCIES.PHP).format(((Number(c) || 0) / 100) * rate);
            }, [settings.currency, settings.secondaryCurrency]);

            const displayWallets = useMemo(() => {
                return window.finance.deriveWallets(wallets, { incomes, bills, dailyExpenses, txns });
            }, [wallets, incomes, bills, dailyExpenses, txns]);

            const totals = useMemo(
                () => window.selectors.computeTotals({ incomes, bills, funds, txns, dailyExpenses }),
                [incomes, bills, funds, txns, dailyExpenses]
            );

            // ── CLOSE MONTH (hook must be before any conditional return) ────
            const [showCloseModal, setShowCloseModal] = useState(false);
            const [showMoreSheet, setShowMoreSheet] = useState(false);
            const [sheetDragY, setSheetDragY] = useState(0);
            const sheetSwipeRef = useRef({ startY: 0, currentY: 0, swiping: false });
            const [showQuickAdd, setShowQuickAdd]   = useState(false);
            const [showUtilMenu, setShowUtilMenu]   = useState(false);
            const [toast, setToast] = useState(null);
            const toastTimer = useRef(null);
            const haptic = useCallback((pattern) => { try { if (navigator.vibrate) navigator.vibrate(pattern || 10); } catch(e) {} }, []);
            const showToast = useCallback((msg, undoFn, duration) => {
                if (toastTimer.current) clearTimeout(toastTimer.current);
                setToast({ msg, undoFn: undoFn || null, duration: duration || (undoFn ? 5000 : 2600) });
                if (!undoFn) toastTimer.current = setTimeout(() => setToast(null), 2600);
            }, []);

            // ── CONFIRM DIALOG ───────────────────────────────────────────────────
            const [confirmState, setConfirmState] = useState(null);

            // ── MODAL SCROLL LOCK ──
            const hasOpenModal = showCloseModal || showQuickAdd || showMoreSheet || confirmState;
            useEffect(() => {
                if (hasOpenModal) { document.body.classList.add('modal-open'); }
                else { document.body.classList.remove('modal-open'); }
                return () => document.body.classList.remove('modal-open');
            }, [hasOpenModal]);
            const requestConfirm = useCallback((message, onConfirm) => {
                setConfirmState({ message, onConfirm });
            }, []);

            // ── KEYBOARD SHORTCUTS ──
            useEffect(() => {
                const handleKeyDown = (ev) => {
                    if (isUnlocked && !ev.target.closest('input, textarea, select')) {
                        if (ev.key === 'Escape') {
                            setShowCloseModal(false); setShowQuickAdd(false); setShowMoreSheet(false);
                            setConfirmState(null);
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isUnlocked]);

            if (!isUnlocked) return e(PinScreen, { targetPin: settings.pin, onUnlock: () => setIsUnlocked(true) });

            // Onboarding screen for first-time users
            if (showOnboarding && window.OnboardingScreen) {
                return e(window.OnboardingScreen, { onDismiss: () => setShowOnboarding(false) });
            }

            // ── LOADING STATE (must be after all hooks) ──
            if (!photoDiaryLoaded || !archivesLoaded) return e('div', { className: 'pin-screen', style: { background: 'var(--bg-body)' } },
                e('div', { style: { textAlign: 'center' } },
                    e('div', { style: { fontSize: 48, marginBottom: 16, opacity: 0.5 } }, e(Icon, { name: 'archive', size: 48, color: 'var(--text-muted)' })),
                    e('div', { style: { color: 'var(--text-muted)', fontSize: 14, fontWeight: 600 } }, 'Loading your data...')
                )
            );

            const handleCloseMonth = () => {
                const now = new Date();
                const monthLabel = now.toLocaleDateString("en-PH", { month: "long", year: "numeric" });
                // FIX #4: use totals.* directly instead of recalculating
                const totalIncome  = totals.totalIncome;
                const totalBills   = totals.paidBills;
                const totalSpent   = totals.totalDailySpent;
                const totalSavings = totals.totalInGoals;
                const remaining    = totals.netAvailable;

                const archive = {
                    id: uid(),
                    month: monthLabel,
                    closedAt: now.toISOString(),
                    totalIncome, totalSpent, totalBills, totalSavings, remaining,
                    snapshot: {
                        incomes: [...incomes],
                        bills:   [...bills],
                        dailyExpenses: [...dailyExpenses],
                        funds: [...funds],
                        txns:  [...txns],
                        wallets: [...displayWallets],
                        photoDiary: [...photoDiary]
                    }
                };

                setArchives(prev => [archive, ...prev]);
                setWallets(displayWallets.map(w => {
                    const activeVaultTxns = txns.filter(t => t.fundId);
                    const vaultDelta = window.finance.getWalletDelta(w.id, { txns: activeVaultTxns });
                    return { ...w, openingBalanceCents: (w.balanceCents || 0) - vaultDelta };
                }));
                setTxns(prev => prev.filter(t => t.fundId));
                // Copy recurring expenses to new month (preserve photo diary links)
                const recurringExpenses = dailyExpenses.filter(e => e.recurring && e.recurring !== "none").map(e => {
                    const newId = uid();
                    // Update linked photo diary entry's expenseId to match new expense
                    if (e.fromDiary) {
                        setPhotoDiary(prev => prev.map(p =>
                            p.expenseId === e.id ? { ...p, expenseId: newId } : p
                        ));
                    }
                    return { ...e, id: newId, date: todayStr() };
                });
                setDailyExpenses(recurringExpenses);
                setIncomes([]);
                // FIX #2: advance dueDate for recurring bills, then reset isPaid
                setBills(prev => prev.map(b => {
                    let nextDue = b.dueDate;
                    if (b.recurring === "monthly" && b.dueDate) {
                        nextDue = addMonths(b.dueDate, 1);
                    } else if (b.recurring === "weekly" && b.dueDate) {
                        const d = new Date(b.dueDate + "T12:00:00");
                        d.setDate(d.getDate() + 7);
                        nextDue = d.toISOString().slice(0, 10);
                    }
                    return { ...b, isPaid: false, paidTxnId: null, paidWalletId: null, dueDate: nextDue };
                }));
                setShowCloseModal(false);
                showToast("Month archived. Fresh start!");
            };

            return e('div', null,
                e('div', { style: { background: "var(--bg-panel)", borderBottom: "1px solid var(--border)", position: "sticky", top: 0, zIndex: Z.STICKY_HEADER } },

                    // ── ROW 1: Logo + Action Buttons ──────────────────────────
                    e('div', { style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px", gap: 8 } },
                        e('div', { style: S.row10 },
                            e('img', { src: "logosinkpeso.png", alt: "Logo", style: { height: 30, width: "auto", objectFit: "contain" } }),
                            e('div', { style: { fontWeight: 900, color: "#FFFFFF", fontSize: 16 }, className: "nav-logo-text" }, 'SINKPESO')
                        ),
                        e('div', { style: { display: "flex", gap: 6, alignItems: "center", flexShrink: 0 } },

                            // ── UTILITY KEBAB MENU ─────────────────────────────────────
                            e('div', { style: { position: "relative" } },
                                // Backdrop to close on outside click
                                showUtilMenu && e('div', {
                                    style: { position: "fixed", inset: 0, zIndex: Z.MENU_BACKDROP },
                                    onClick: () => setShowUtilMenu(false)
                                }),
                                // Three-dot trigger
                                e('button', {
                                    onClick: () => setShowUtilMenu(!showUtilMenu),
                                    title: "More actions",
                                    className: "util-menu-btn",
                                    style: {
                                        background: showUtilMenu ? "var(--hover-bg)" : "transparent",
                                        border: "1px solid rgba(255,255,255,0.09)",
                                        color: showUtilMenu ? "var(--text-main)" : "var(--text-muted)",
                                        width: 34, height: 34, borderRadius: 8,
                                        cursor: "pointer", display: "flex",
                                        alignItems: "center", justifyContent: "center",
                                        transition: "all 0.15s", flexShrink: 0,
                                    },
                                },
                                    e(Icon, { name: "more", size: 16 })
                                ),
                                // Dropdown panel
                                showUtilMenu && e('div', {
                                    style: {
                                        position: "absolute", right: 0, top: "calc(100% + 6px)",
                                        background: "var(--bg-panel)",
                                        border: "1px solid var(--border)",
                                        borderRadius: 12, padding: 4,
                                        zIndex: Z.MENU_DROPDOWN, minWidth: 178,
                                        boxShadow: "0 8px 28px rgba(0,0,0,0.45)",
                                    }
                                },
                                    e('button', {
                                        className: "dot-menu-item",
                                        onClick: () => { setShowUtilMenu(false); setShowCloseModal(true); },
                                        style: { display: "flex", alignItems: "center", gap: 10, color: "var(--text-main)" }
                                    },
                                        e(Icon, { name: "archive", size: 14, color: "var(--text-muted)" }),
                                        "Archive Month"
                                    ),
                                    settings.pin && e('button', {
                                        className: "dot-menu-item",
                                        onClick: () => { setShowUtilMenu(false); setIsUnlocked(false); },
                                        style: { display: "flex", alignItems: "center", gap: 10, color: "var(--text-main)" }
                                    },
                                        e(Icon, { name: "lock", size: 14, color: "var(--text-muted)" }),
                                        "Lock App"
                                    )
                                )
                            ),

                            // PDF Export button (premium only, visible on all tabs)
                            window.license && window.license.canUseFeature('pdfExport') && e('button', {
                                onClick: function() {
                                    var panel = document.querySelector('[role="tabpanel"]');
                                    var header = null;
                                    if (panel) {
                                        header = document.createElement('div');
                                        header.className = 'print-branded-header';
                                        var now = new Date();
                                        var dateStr = now.toLocaleDateString('en-PH', { month: 'long', day: 'numeric', year: 'numeric' });
                                        var timeStr = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
                                        header.innerHTML = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
                                            '<span style="font-size:20px;font-weight:900;color:#00E676;letter-spacing:0.04em">SINKPESO</span>' +
                                            '<span style="font-size:11px;color:#888;font-weight:600">by Lodoy Goes Random</span>' +
                                            '</div>' +
                                            '<div style="font-size:10px;color:#999;border-bottom:1px solid #ddd;padding-bottom:8px">' +
                                            'Generated on ' + dateStr + ' at ' + timeStr + ' · Private · Offline · Yours</div>';
                                        panel.insertBefore(header, panel.firstChild);
                                    }
                                    document.body.classList.add('print-report');
                                    window.print();
                                    setTimeout(function() {
                                        document.body.classList.remove('print-report');
                                        if (header && header.parentNode) header.parentNode.removeChild(header);
                                    }, 600);
                                },
                                title: "Export PDF",
                                style: { ...S.iconBtn, color: "var(--text-muted)" }
                            }, e(Icon, { name: "download", size: 16 })),

                            e('button', { 
                                onClick: () => setTab("settings"), title: "Settings",
                                style: { ...S.iconBtn, background: tab === "settings" ? "var(--hover-bg)" : "transparent", color: tab === "settings" ? "var(--text-main)" : "var(--text-muted)" }
                            }, e(Icon, { name: "settings", size: 16 }))
                        )
                    ),

                    // ── ROW 2: Nav Tabs — Primary + Secondary ─────────────────
                e('div', { role: "tablist", "aria-label": "Main navigation", className: "nav-scroll desktop-tabs", style: { display: "flex", alignItems: "center", overflowX: "auto", padding: "0 12px 0", borderTop: "1px solid var(--border)" } },

                        // Primary tabs
                        [
                            { id: "dashboard",   label: "Dashboard" },
                            { id: "budget",      label: "Bills & Income" },
                            { id: "daily",       label: "Daily Expenses" },
                            { id: "goals",       label: "Savings Vaults" },
                            { id: "photo-diary", label: "Photo Diary" },
                        ].map(t => e('button', {
                            key: t.id, className: "nav-btn", onClick: () => setTab(t.id),
                            style: { background: "transparent", color: tab === t.id ? "var(--text-main)" : "var(--text-muted)", border: "none", borderBottom: tab === t.id ? "2px solid #00E676" : "2px solid transparent", padding: "12px 16px", cursor: "pointer", fontSize: 13, fontWeight: tab === t.id ? 700 : 500, whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.18s" }
                        }, t.label)),
