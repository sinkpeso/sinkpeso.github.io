<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINKPESO — Offline</title>
    <meta name="theme-color" content="#020810">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020810;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 400px; }
        .icon {
            width: 64px; height: 64px;
            margin: 0 auto 24px;
            border-radius: 16px;
            background: rgba(245,158,11,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        p {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            background: #00E676;
            color: #020810;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }
        .btn:hover { background: #00c853; }
        .sub { font-size: 12px; color: #475569; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.55a11 11 0 0114.08 0"/>
                <path d="M1.42 9a16 16 0 0121.16 0"/>
                <path d="M8.53 16.11a6 6 0 016.95 0"/>
                <circle cx="12" cy="20" r="1"/>
                <path d="M1 1l22 22"/>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>
            SINKPESO works fully offline, but this specific page hasn't been saved to your device yet.
        </p>
        <a href="app.html" class="btn">Open the App</a>
        <p class="sub">
            All your financial data is stored locally on your device and is always accessible from the app.
        </p>
    </div>
</body>
</html>
