<head>

    <title>SINKPESO — Premium Budget Tracker</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* THEME VARIABLES */
        :root {
            --bg-body: #020810;
            --bg-panel: #0A0E1A;
            --bg-input: #0F1526;
            --text-main: #F1F5F9;
            --text-muted: #475569;
            --text-light: #7C8FA6;
            --border: rgba(255,255,255,0.055);
            --border-input: rgba(255,255,255,0.09);
            --gradient-start: #091020;
            --gradient-end: #020810;
            --card-grad-start: #141E32;
            --card-grad-end: #0A0E1A;
            --hover-bg: rgba(255,255,255,0.05);
            --modal-bg: rgba(2, 8, 16, 0.88);
            --accent: #00E676;
            --accent-dim: rgba(0,230,118,0.08);
            --accent-border: rgba(0,230,118,0.2);
            /* spacing scale (8px grid) */
            --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
            --sp-5: 20px; --sp-6: 24px; --sp-7: 28px; --sp-8: 32px;
            /* type scale */
            --t-xs: 11px; --t-sm: 12px; --t-base: 13px; --t-md: 15px; --t-lg: 17px;
            --t-xl: 22px; --t-hero: 36px;
            /* radius */
            --r-sm: 10px; --r-md: 14px; --r-lg: 18px; --r-xl: 22px;
        }

        [data-theme="light"] {
            --bg-body: #F5F7FA;
            --bg-panel: #FFFFFF;
            --bg-input: #EEF2F7;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --text-light: #475569;
            --border: rgba(0,0,0,0.08);
            --border-input: rgba(0,0,0,0.12);
            --gradient-start: #DDE4F0;
            --gradient-end: #F5F7FA;
            --card-grad-start: #C8D3E8;
            --card-grad-end: #DDE4F0;
            --hover-bg: rgba(0,0,0,0.05);
            --modal-bg: rgba(245, 247, 250, 0.88);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'DM Sans', -apple-system, sans-serif; 
            background-color: var(--bg-body); 
            background: radial-gradient(ellipse at 50% -10%, var(--gradient-start) 0%, var(--gradient-end) 65%);
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #00E676; }

        /* ── iOS SAFARI ZOOM PREVENTION ── */
        input, select, textarea { font-size: 16px !important; }

        .dashboard-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 24px; margin-top: 24px; }
        .category-box-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 16px; }
        
        @media (max-width: 900px) { 
            .dashboard-grid { grid-template-columns: 1fr; gap: 16px; } 
            .category-box-grid { grid-template-columns: 1fr; gap: 12px; }
        }
        
        /* ── MOBILE NAV FIX ── */
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @media (max-width: 600px) {
            .nav-btn { padding: 8px 10px !important; font-size: 11px !important; white-space: nowrap; }
            .nav-logo-text { font-size: 14px !important; }
        }

        .tf { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        @media (max-width: 680px) { .tf > div, .tf > button { width: 100% !important; } }
        
        /* ── PREMIUM PANEL ── */
        .premium-panel { 
            background: var(--bg-panel); 
            border: 1px solid var(--border); 
            border-radius: var(--r-xl); 
            box-shadow: 0 1px 12px rgba(0, 0, 0, 0.04);
            padding: var(--sp-6);
            margin-bottom: var(--sp-4);
        }
        @media (max-width: 600px) {
            .premium-panel { padding: var(--sp-5) var(--sp-4); border-radius: var(--r-lg); }
        }

        /* ── BALANCE CARD ── */
        .balance-gradient-card {
            background: linear-gradient(140deg, var(--card-grad-start) 0%, var(--card-grad-end) 100%);
            border: 1px solid var(--border-input);
            border-radius: var(--r-xl);
            padding: var(--sp-7);
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }
        @media (max-width: 600px) {
            .balance-gradient-card { padding: var(--sp-5) var(--sp-4); border-radius: var(--r-lg); }
        }

        .balance-gradient-card::before {
            content: '';
            position: absolute;
            top: -60%; right: -15%;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(0, 230, 118, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── CATEGORY MINI CARD ── */
        .category-mini-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: var(--sp-4);
            transition: transform 0.2s, border-color 0.2s;
        }
        @media (max-width: 600px) {
            .category-mini-card { padding: var(--sp-3) var(--sp-3); border-radius: var(--r-sm); }
        }
        .category-mini-card:hover { transform: translateY(-1px); border-color: var(--border-input); }

        /* ── STREAM ROW ── */
        .stream-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-4) 0;
            border-bottom: 1px solid var(--border);
            gap: var(--sp-3);
        }
        .stream-row:last-child { border-bottom: none; }
        @media (max-width: 600px) {
            .stream-row { padding: var(--sp-3) 0; }
        }

        /* Chart Styles */
        .chart-container { display: flex; align-items: flex-end; gap: 12px; height: 180px; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 14px; overflow-x: auto; }
        .chart-bar-group { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 56px; }
        .bars-wrapper { display: flex; gap: 3px; align-items: flex-end; height: 100%; width: 100%; justify-content: center; }
        .chart-bar { width: 20px; border-radius: 3px 3px 0 0; transition: height 0.4s ease; }
        .bar-income { background: #00E676; opacity: 0.85; }
        .bar-spent { background: #EF4444; opacity: 0.75; }

        /* Dot Menu */
        .dot-menu-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: var(--sp-2); font-size: 18px; font-weight: 900; transition: all 0.15s; display: flex; align-items: center; justify-content: center; min-width: 34px; min-height: 34px; }
        .dot-menu-btn:hover { color: var(--text-main); background: var(--hover-bg); }
        .dot-menu-dropdown { position: absolute; right: 0; top: calc(100% + 4px); background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--r-md); padding: 4px; z-index: 300; min-width: 130px; box-shadow: 0 8px 28px rgba(0,0,0,0.28); }
        .dot-menu-item { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 10px 12px; border-radius: var(--r-sm); cursor: pointer; font-size: var(--t-base); font-weight: 600; color: var(--text-main); transition: background 0.12s; }
        .dot-menu-item:hover { background: var(--hover-bg); }

        /* ── MODAL ── */
        .modal-overlay { position: fixed; inset: 0; background: var(--modal-bg); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: var(--sp-4); }
        .modal-container { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--r-xl); padding: var(--sp-7); width: 100%; max-width: 480px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
        @media (max-width: 600px) {
            .modal-container { padding: var(--sp-5) var(--sp-4); border-radius: var(--r-lg); }
        }
        
        .pin-screen { position: fixed; inset: 0; background: var(--bg-body); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--sp-6); }
        .pin-input { font-family: 'DM Mono', monospace; font-size: 28px; letter-spacing: 14px; text-align: center; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-input); padding: var(--sp-4); border-radius: var(--r-lg); outline: none; width: 240px; }

        /* ── SECTION SPACING ── */
        .section-gap { margin-bottom: 20px; }
        @media (max-width: 600px) { .section-gap { margin-bottom: 14px; } }
    
        /* ── VAULTS GRID ── */
        .vaults-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 16px; margin-top: 16px; }
        @media (max-width: 600px) { .vaults-grid { grid-template-columns: 1fr; gap: 12px; } }

        /* ── BOTTOM NAV (mobile only) ── */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-panel); border-top: 1px solid var(--border); z-index: 200; padding: 6px 0 env(safe-area-inset-bottom, 6px); backdrop-filter: blur(12px); }
        @media (max-width: 768px) { .bottom-nav { display: flex; } }
        @media (max-width: 768px) { .desktop-tabs { display: none !important; } }
        @media (max-width: 768px) { .page-wrap { padding-bottom: 88px !important; } }
        .bnav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 7px 2px 4px; color: var(--text-muted); font-size: 10px; font-weight: 600; letter-spacing: 0.03em; transition: color 0.15s; min-width: 0; }
        .bnav-btn.active { color: #00E676; }
        .bnav-btn svg { opacity: 0.55; transition: opacity 0.15s; }
        .bnav-btn.active svg { opacity: 1; }

        /* ── FLOATING ACTION BUTTON ── */
        .fab { position: fixed; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #020810; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,230,118,0.22); z-index: 180; transition: transform 0.18s, box-shadow 0.18s; bottom: 88px; }
        @media (min-width: 769px) { .fab { bottom: 32px; } }
        .fab:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,230,118,0.32); }
        .fab:active { transform: scale(0.96); }

        /* ── TOAST ── */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); border: 1px solid rgba(0,230,118,0.25); color: var(--text-main); padding: 10px 20px; border-radius: var(--r-md); font-size: var(--t-base); font-weight: 600; z-index: 9000; animation: slideUp 0.25s ease; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.35); pointer-events: none; letter-spacing: 0.01em; }
        @media (min-width: 769px) { .toast { bottom: 36px; } }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }

        /* ── MORE BOTTOM SHEET ── */
        .sheet-overlay { position: fixed; inset: 0; background: var(--modal-bg); backdrop-filter: blur(8px); z-index: 500; display: flex; align-items: flex-end; }
        .sheet-panel { background: var(--bg-panel); border-radius: var(--r-xl) var(--r-xl) 0 0; border-top: 1px solid var(--border); width: 100%; padding: 0 0 env(safe-area-inset-bottom, 16px); animation: sheetUp 0.22s ease; }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet-handle { width: 32px; height: 3px; background: var(--border-input); border-radius: 2px; margin: 14px auto 18px; }
        .sheet-row { display: flex; align-items: center; gap: var(--sp-4); padding: var(--sp-4) var(--sp-6); cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; }
        .sheet-row:last-child { border-bottom: none; }
        .sheet-row:hover { background: var(--hover-bg); }
        .sheet-row-icon { width: 32px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .sheet-row-label { font-size: var(--t-md); font-weight: 600; color: var(--text-main); }
        .sheet-row-sub { font-size: var(--t-sm); color: var(--text-muted); margin-top: 2px; }

        /* ── QUICK ADD FORM ── */
        .quick-add-amount { font-family: 'DM Mono', monospace; font-size: 34px; font-weight: 500; text-align: center; background: transparent; color: var(--text-main); border: none; border-bottom: 2px solid var(--border-input); padding: var(--sp-2) var(--sp-4); width: 100%; outline: none; margin-bottom: var(--sp-2); }
        .quick-add-amount:focus { border-bottom-color: var(--accent); }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-2); margin: var(--sp-4) 0; }
        .cat-btn { padding: 10px 6px; border: 1px solid var(--border); border-radius: var(--r-sm); background: var(--bg-input); color: var(--text-light); font-size: var(--t-sm); font-weight: 600; cursor: pointer; transition: all 0.15s; text-align: center; }
        .cat-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

        /* ── SAFE SPEND CHIP ── */
        .safe-chip { display: inline-flex; align-items: center; gap: var(--sp-2); background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); padding: 5px 12px; border-radius: var(--sp-2); font-size: var(--t-base); font-weight: 600; margin-top: var(--sp-4); }

        /* ── EMPTY STATE ── */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--sp-8) var(--sp-6); text-align: center; color: var(--text-muted); gap: var(--sp-2); }
        .empty-state-icon { opacity: 0.3; margin-bottom: var(--sp-1); }
        .empty-state-title { font-size: var(--t-base); font-weight: 700; color: var(--text-light); }
        .empty-state-sub { font-size: var(--t-sm); max-width: 220px; line-height: 1.6; }
</style>

        // ── ERROR BOUNDARY ────────────────────────────────────────────────────
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error("SINKPESO crash:", error, info); }
            render() {
                if (this.state.hasError) {
                    return e('div', { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24, fontFamily: "Inter, sans-serif" } },

                return this.props.children;
            }
        }

        const safeGet = (key, fallback = []) => { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; } };

        // ── CORE APPLICATION ──────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("dashboard");

            const defaultSettings = { currency: 'PHP', theme: 'dark', pin: '' };
            const [settings, setSettings] = useState(() => {
                try { 
                    const saved = JSON.parse(localStorage.getItem("sp_settings"));
                    return saved && typeof saved === 'object' ? { ...defaultSettings, ...saved } : defaultSettings;
                }
                catch { return defaultSettings; }
            });
            const [isUnlocked, setIsUnlocked] = useState(!settings.pin);

            const [funds, setFunds] = useState(() => safeGet("sp_funds"));
            const [txns, setTxns] = useState(() => safeGet("sp_txns"));
            const [incomes, setIncomes] = useState(() => safeGet("sp_incomes"));
            const [bills, setBills] = useState(() => safeGet("sp_bills"));
            const [dailyExpenses, setDailyExpenses] = useState(() => safeGet("sp_daily"));
            const [archives, setArchives] = useState(() => safeGet("sp_archives"));
            const [budgets, setBudgets] = useState(() => safeGet("sp_budgets"));
            const [wallets, setWallets] = useState(() => {
                const saved = safeGet("sp_wallets");
                return saved.find(w => w.id === CASH_WALLET_ID) ? saved : [CASH_WALLET, ...saved];
            });

            // Sync states to LocalStorage & Apply Theme
            useEffect(() => {
                localStorage.setItem("sp_settings", JSON.stringify(settings));
                document.documentElement.setAttribute('data-theme', settings.theme);
            }, [settings]);
            useEffect(() => { localStorage.setItem("sp_funds", JSON.stringify(funds)); }, [funds]);
            useEffect(() => { localStorage.setItem("sp_txns", JSON.stringify(txns)); }, [txns]);
            useEffect(() => { localStorage.setItem("sp_incomes", JSON.stringify(incomes)); }, [incomes]);
            useEffect(() => { localStorage.setItem("sp_bills", JSON.stringify(bills)); }, [bills]);
            useEffect(() => { localStorage.setItem("sp_daily", JSON.stringify(dailyExpenses)); }, [dailyExpenses]);
            useEffect(() => { localStorage.setItem("sp_archives", JSON.stringify(archives)); }, [archives]);
            useEffect(() => { localStorage.setItem("sp_budgets", JSON.stringify(budgets)); }, [budgets]);
            useEffect(() => { localStorage.setItem("sp_wallets", JSON.stringify(wallets)); }, [wallets]);

            // Currency Formatter bound to state
            const fc = useMemo(() => {
                return (c) => new Intl.NumberFormat("en-PH", CURRENCIES[settings.currency] || CURRENCIES.PHP).format((Number(c) || 0) / 100);
            }, [settings.currency]);

            const totals = useMemo(() => {
                const totalIncome = incomes.reduce((sum, i) => sum + i.amountCents, 0);
                const paidBills = bills.reduce((sum, b) => sum + (b.isPaid ? b.amountCents : 0), 0);
                const unpaidBills = bills.reduce((sum, b) => sum + (!b.isPaid ? b.amountCents : 0), 0);
                const totalDailySpent = dailyExpenses.reduce((sum, e) => sum + e.amountCents, 0);
                
                let totalInGoals = 0;
                const enrichedFunds = funds.map(f => {
                    const r = txns.filter(t => t.fundId === f.id);
                    const dep = r.filter(t => t.type === "deposit").reduce((sum, t) => sum + t.amountCents, 0);
                    const wit = r.filter(t => t.type === "withdrawal").reduce((sum, t) => sum + t.amountCents, 0);
                    const bal = (f.startCents || 0) + dep - wit;
                    totalInGoals += bal;
                    return { ...f, bal, pct: safeDiv(bal, f.goalCents) };
                });

                const netAvailable = totalIncome - paidBills - totalDailySpent - totalInGoals;

                // Sum categories properly combining daily expenses and paid bills
                const catSum = { Food: 0, Gas: 0, Bills: 0, Business: 0, Personal: 0, Savings: totalInGoals };
                dailyExpenses.forEach(exp => { catSum[exp.category] = (catSum[exp.category] || 0) + exp.amountCents; });
                bills.filter(b => b.isPaid).forEach(b => { 
                    catSum["Bills"] = (catSum["Bills"] || 0) + b.amountCents; 
                });

                let healthStatus = { label: "Optimal", color: "#00E676", bg: "rgba(0, 230, 118, 0.08)" };
                const closeBillExists = bills.some(b => !b.isPaid && getDaysRemaining(b.dueDate) <= 3);
                const dailySpendingRatio = safeDiv(totalDailySpent, totalIncome);

                if (closeBillExists || unpaidBills > 0) { healthStatus = { label: "Overhead Warning", color: "#FF1744", bg: "rgba(255, 23, 68, 0.09)" }; } 
                else if (dailySpendingRatio > 0.40) { healthStatus = { label: "Caution", color: "#FFD600", bg: "rgba(255, 214, 0, 0.09)" }; }

                return { totalIncome, paidBills, unpaidBills, totalDailySpent, totalInGoals, netAvailable, enrichedFunds, catSum, healthStatus };
            }, [incomes, bills, funds, txns, dailyExpenses]);

            // ── CLOSE MONTH (hook must be before any conditional return) ────
            const [showCloseModal, setShowCloseModal] = useState(false);
            const [showMoreSheet, setShowMoreSheet] = useState(false);
            const [showQuickAdd, setShowQuickAdd]   = useState(false);
            const [toast, setToast] = useState(null);
            const toastTimer = useRef(null);
            const showToast = (msg) => {
                if (toastTimer.current) clearTimeout(toastTimer.current);
                setToast(msg);
                toastTimer.current = setTimeout(() => setToast(null), 2600);
            };

            if (!isUnlocked) return e(PinScreen, { targetPin: settings.pin, onUnlock: () => setIsUnlocked(true) });

            const handleCloseMonth = () => {
                const now = new Date();
                const monthLabel = now.toLocaleDateString("en-PH", { month: "long", year: "numeric" });
                // FIX #4: use totals.* directly instead of recalculating
                const totalIncome  = totals.totalIncome;
                const totalBills   = totals.paidBills;
                const totalSpent   = totals.totalDailySpent;
                const totalSavings = totals.totalInGoals;
                const remaining    = totals.netAvailable;

                const archive = {
                    id: uid(),
                    month: monthLabel,
                    closedAt: now.toISOString(),
                    totalIncome, totalSpent, totalBills, totalSavings, remaining,
                    snapshot: {
                        incomes: [...incomes],
                        bills:   [...bills],
                        dailyExpenses: [...dailyExpenses],
                        funds: [...funds],
                        txns:  [...txns],
                        wallets: [...wallets]
                    }
                };

                setArchives(prev => [archive, ...prev]);
                setDailyExpenses([]);
                setIncomes([]);
                // FIX #2: advance dueDate for recurring bills, then reset isPaid
                setBills(prev => prev.map(b => {
                    let nextDue = b.dueDate;
                    if (b.recurring === "monthly" && b.dueDate) {
                        nextDue = addMonths(b.dueDate, 1);
                    } else if (b.recurring === "weekly" && b.dueDate) {
                        const d = new Date(b.dueDate + "T00:00:00");
                        d.setDate(d.getDate() + 7);
                        nextDue = d.toISOString().slice(0, 10);
                    }
                    return { ...b, isPaid: false, dueDate: nextDue };
                }));
                setShowCloseModal(false);
                showToast("✓ Month archived. Fresh start!");
            };

            return e('div', null,
                e('div', { style: { background: "var(--bg-panel)", borderBottom: "1px solid var(--border)", position: "sticky", top: 0, zIndex: 100 } },

                    // ── ROW 1: Logo + Action Buttons ──────────────────────────
                    e('div', { style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px", gap: 8 } },
                        e('div', { style: S.row10 },
                            e('img', { src: "logosinkpeso.png", alt: "Logo", style: { height: 30, width: "auto", objectFit: "contain" } }),
                            e('div', { style: { fontWeight: 900, color: "#FFFFFF", fontSize: 16 }, className: "nav-logo-text" }, 'SINKPESO')
                        ),
                        e('div', { style: { display: "flex", gap: 6, alignItems: "center", flexShrink: 0 } },
                            settings.pin && e('button', { onClick: () => setIsUnlocked(false), style: S.chip("rgba(239,68,68,0.1)", "#EF4444", "transparent") },
                                e(Icon, { name: "lock", size: 14 }), "Lock"
                            ),
                            e('button', { onClick: () => setShowCloseModal(true), style: S.chip("rgba(168,85,247,0.12)", "#A855F7", "rgba(168,85,247,0.25)") },
                                e(Icon, { name: "archive", size: 14 }), "Archive"
                            ),
                            e('button', { 
                                onClick: () => setTab("settings"), title: "Settings",
                                style: { ...S.iconBtn, background: tab === "settings" ? "var(--hover-bg)" : "transparent", color: tab === "settings" ? "var(--text-main)" : "var(--text-muted)" }
                            }, e(Icon, { name: "settings", size: 16 }))
                        )
                    ),

                    // ── ROW 2: Nav Tabs — Primary + Secondary ─────────────────
                    e('div', { className: "nav-scroll desktop-tabs", style: { display: "flex", alignItems: "center", overflowX: "auto", padding: "0 12px 0", borderTop: "1px solid var(--border)" } },

                        // Primary tabs
                        [
                            { id: "dashboard", label: "Dashboard" },
                            { id: "budget",    label: "Bills & Income" },
                            { id: "daily",     label: "Daily Expenses" },
                            { id: "goals",     label: "Savings Vaults" },
                        ].map(t => e('button', {
                            key: t.id, className: "nav-btn", onClick: () => setTab(t.id),
                            style: { background: "transparent", color: tab === t.id ? "var(--text-main)" : "var(--text-muted)", border: "none", borderBottom: tab === t.id ? "2px solid #00E676" : "2px solid transparent", padding: "12px 16px", cursor: "pointer", fontSize: 13, fontWeight: tab === t.id ? 700 : 500, whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.18s" }
                        }, t.label)),

                        // Divider
                        e('div', { style: { width: 1, height: 18, background: "var(--border)", margin: "0 8px", flexShrink: 0 } }),

                        // Secondary tabs — smaller, clearly subordinate
                        [
                            { id: "wallets",      label: "Wallets" },
                            { id: "limits",       label: "Limits" },
                            { id: "transactions", label: "Logs" },
                            { id: "history",      label: "History" },
                        ].map(t => e('button', {
                            key: t.id, className: "nav-btn", onClick: () => setTab(t.id),
                            style: { background: "transparent", color: tab === t.id ? "var(--text-light)" : "var(--text-muted)", border: "none", borderBottom: tab === t.id ? "2px solid rgba(148,163,184,0.6)" : "2px solid transparent", padding: "12px 12px", cursor: "pointer", fontSize: 12, fontWeight: tab === t.id ? 600 : 400, whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.18s", opacity: tab === t.id ? 1 : 0.7 }
                        }, t.label))
                    )
                ),
                
                e('div', { className: "page-wrap", style: { maxWidth: 1140, margin: "0 auto", padding: "clamp(16px, 4vw, 32px) clamp(12px, 4vw, 24px) 80px" } },
                    tab === "dashboard" && e(DashboardOverview, { totals, bills, dailyExpenses, budgets, wallets, fc }),
                    tab === "limits" && e(BudgetLimitsView, { budgets, setBudgets, fc }),
                    tab === "wallets" && e(WalletsView, { wallets, setWallets, fc }),
                    tab === "budget" && e(BudgetBillsView, { incomes, setIncomes, bills, setBills, wallets, setWallets, fc }),
                    tab === "daily" && e(DailyExpensesView, { dailyExpenses, setDailyExpenses, wallets, setWallets, fc }),
                    tab === "goals" && e(SinkingFundsView, { funds, setFunds, enrichedFunds: totals.enrichedFunds, txns, setTxns, wallets, setWallets, fc }),
                    tab === "transactions" && e(TransactionsView, { txns, setTxns, funds, fc }),
                    tab === "history" && e(HistoryView, { archives, fc }),
                    tab === "settings" && e(SettingsView, { settings, setSettings, setIncomes, setBills, setDailyExpenses, setFunds, setTxns, setArchives, setBudgets, showToast, totals, bills, budgets, fc }),

e('footer', { 
                    style: { 
                        textAlign: "center", padding: "40px 20px", marginTop: "40px", 
                        borderTop: "1px solid var(--border)",
                        color: "var(--text-muted)", fontSize: "12px", letterSpacing: "0.05em"
                    } 
                }, 
                    e('div', { style: { fontWeight: 800, color: "var(--text-light)", marginBottom: 6, letterSpacing: "0.14em" } }, "LODOY GOES RANDOM"),
                    e('div', { style: { opacity: 0.5, fontSize: 11 } }, "Private offline finance tracking · No account required.")
                )
                ),

                // ── CLOSE MONTH MODAL ────────────────────────────────────────

                // ── TOAST NOTIFICATION ──────────────────────────────────────
                toast && e('div', { className: "toast" }, toast),

                // ── FLOATING QUICK ADD BUTTON ───────────────────────────────
                e('button', { className: "fab", title: "Quick Add Expense", onClick: () => setShowQuickAdd(true) }, e(Icon, { name: "plus", size: 26, color: "#030712" })),

                // ── MOBILE BOTTOM NAV ───────────────────────────────────────
                e('div', { className: "bottom-nav" },
                    [
                        { id: "dashboard", icon: "home",    label: "Home" },
                        { id: "daily",     icon: "wallet",  label: "Expenses" },
                        { id: "budget",    icon: "receipt", label: "Bills" },
                        { id: "goals",     icon: "landmark",label: "Savings" },
                        { id: "more",      icon: "more",    label: "More" }
                    ].map(t => e('button', {
                        key: t.id,
                        className: "bnav-btn" + (tab === t.id || (t.id === "more" && ["wallets","limits","transactions","history","settings"].includes(tab)) ? " active" : ""),
                        onClick: () => t.id === "more" ? setShowMoreSheet(true) : setTab(t.id)
                    },
                        e(Icon, { name: t.icon, size: 22 }),
                        e('span', null, t.label)
                    ))
                ),

                // ── MORE BOTTOM SHEET ───────────────────────────────────────
                showMoreSheet && e('div', { className: "sheet-overlay", onClick: () => setShowMoreSheet(false) },
                    e('div', { className: "sheet-panel", onClick: ev => ev.stopPropagation() },
                        e('div', { className: "sheet-handle" }),
                        [
                            { id: "wallets",      icon: "creditcard", label: "Wallets",        sub: "Cash, GCash, bank accounts" },
                            { id: "limits",       icon: "grid",    label: "Budget Limits",  sub: "Set spending caps per category" },
                            { id: "transactions", icon: "list",    label: "Vault Logs",      sub: "Deposit & withdrawal history" },
                            { id: "history",      icon: "history", label: "Month History",   sub: "Archived monthly snapshots" },
                            { id: "settings",     icon: "settings",label: "Settings",        sub: "Preferences, PIN, backup" },
                        ].map(t => e('div', { key: t.id, className: "sheet-row", onClick: () => { setTab(t.id); setShowMoreSheet(false); } },
                            e('span', { className: "sheet-row-icon" }, e(Icon, { name: t.icon, size: 22, color: "var(--text-light)" })),
                            e('div', null,
                                e('div', { className: "sheet-row-label" }, t.label),
                                e('div', { className: "sheet-row-sub" }, t.sub)
                            )
                        )),
                        e('div', { className: "sheet-row", style: { color: "#A855F7" }, onClick: () => { setShowMoreSheet(false); setShowCloseModal(true); } },
                            e('span', { className: "sheet-row-icon" }, e(Icon, { name: "archive", size: 22, color: "#A855F7" })),
                            e('div', null,
                                e('div', { className: "sheet-row-label", style: { color: "#A855F7" } }, "Archive & Start New Month"),
                                e('div', { className: "sheet-row-sub" }, "Save snapshot, reset monthly data")
                            )
                        )
                    )
                ),

                // ── QUICK ADD EXPENSE MODAL ─────────────────────────────────
                showQuickAdd && e(QuickAddModal, { 
                    wallets, setWallets,
                    onSave: (item) => { 
                        setDailyExpenses(prev => [item, ...prev]); 
                        setShowQuickAdd(false); 
                        showToast("✓ Expense logged!"); 
                    }, 
                    onClose: () => setShowQuickAdd(false) 
                }),

                showCloseModal && e('div', { className: "modal-overlay", onClick: () => setShowCloseModal(false) },
                    e('div', { className: "modal-container", style: { maxWidth: 440 }, onClick: ev => ev.stopPropagation() },

                        // Header
                        e('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 } },
                            e('div', null,
                                e('h3', { style: { fontSize: 18, fontWeight: 800, color: "var(--text-main)" } }, "Close This Month"),
                                e('div', { style: { fontSize: 13, color: "var(--text-muted)", marginTop: 4 } },
                                    new Date().toLocaleDateString("en-PH", { month: "long", year: "numeric" })
                                )
                            ),
                            e('button', { onClick: () => setShowCloseModal(false), style: S.closeBtn }, e(Icon, { name: "x", size: 16 }))
                        ),

                        // What happens section
                        e('div', { style: { background: "rgba(168,85,247,0.06)", border: "1px solid rgba(168,85,247,0.18)", borderRadius: 12, padding: "14px 16px", marginBottom: 14 } },
                            e('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#A855F7", marginBottom: 10 } }, "What will be archived & reset"),
                            [
                                ["archive",    "Archived", "Income entries → saved to History"],
                                ["receipt",    "Archived", "Bills snapshot (paid/unpaid status)"],
                                ["wallet",     "Archived", "All daily expenses"],
                                ["arrowupdown","Reset",    "Bills marked back to unpaid"],
                                ["trash",      "Cleared",  "Income & daily expense lists"],
                            ].map(([icon, badge, text], i) =>
                                e('div', { key: i, style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 8 } },
                                    e(Icon, { name: icon, size: 14, color: "#A855F7" }),
                                    e('span', { style: { fontSize: 10, fontWeight: 700, background: "rgba(168,85,247,0.18)", color: "#A855F7", padding: "2px 7px", borderRadius: 5, flexShrink: 0 } }, badge),
                                    e('span', { style: { fontSize: 13, color: "var(--text-light)" } }, text)
                                )
                            )
                        ),

                        // Safe zone section
                        e('div', { style: { background: "rgba(0,230,118,0.05)", border: "1px solid rgba(0,230,118,0.12)", borderRadius: 12, padding: "14px 16px", marginBottom: 24 } },
                            e('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#00E676", marginBottom: 10 } }, "Always preserved — never touched"),
                            [
                                ["landmark",  "Savings Vaults & vault balances"],
                                ["settings",  "Settings, PIN & preferences"],
                                ["grid",      "Budget limits"],
                                ["history",   "All previous history archives"],
                            ].map(([icon, text], i) =>
                                e('div', { key: i, style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 6 } },
                                    e(Icon, { name: icon, size: 14, color: "#00E676" }),
                                    e('span', { style: { fontSize: 13, color: "var(--text-light)" } }, text)
                                )
                            )
                        ),

                        // Action buttons
                        e('div', { style: { display: "flex", gap: 10 } },
                            e(Btn, { v: "ghost", style: { flex: 1 }, onClick: () => setShowCloseModal(false) }, "Cancel"),
                            e(Btn, { v: "primary", style: { flex: 1, background: "#A855F7" }, onClick: handleCloseMonth }, "Archive & Start Fresh")
                        )
                    )
                )
            );
        }

        // ── SETTINGS GROUP HELPER ─────────────────────────────────────────────
        function SettingGroup({ title, icon, children }) {
            return e('div', { className: "premium-panel", style: { marginBottom: 16 } },
                e('div', { style: { display:"flex", alignItems:"center", gap:8, marginBottom:16, paddingBottom:12, borderBottom:"1px solid var(--border)" } },
                    e(Icon, { name: icon, size: 14, color: "var(--text-muted)" }),
                    e('div', { style: { fontSize:11, fontWeight:700, letterSpacing:"0.09em", textTransform:"uppercase", color:"var(--text-muted)" } }, title)
                ),
                children
            );
        }

        // ── MODULE: SETTINGS ─────────────────────────────────────────────────
        function SettingsView({ settings, setSettings, setIncomes, setBills, setDailyExpenses, setFunds, setTxns, setArchives, setBudgets, showToast, totals, bills, budgets, fc }) {
            const safeSettings = settings || {};
            const [pinInput, setPinInput] = useState(safeSettings?.pin || '');

            const handleExport = () => {
                const data = {
                    sp_funds: localStorage.getItem('sp_funds'),
                    sp_txns: localStorage.getItem('sp_txns'),
                    sp_incomes: localStorage.getItem('sp_incomes'),
                    sp_bills: localStorage.getItem('sp_bills'),
                    sp_daily: localStorage.getItem('sp_daily'),
                    sp_archives: localStorage.getItem('sp_archives'),
                    sp_budgets: localStorage.getItem('sp_budgets'),
                    sp_wallets: localStorage.getItem('sp_wallets'),
                    sp_settings: localStorage.getItem('sp_settings')
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `sinkpeso_backup_${todayStr()}.json`; a.click();
            };

            const handleImport = (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        Object.keys(data).forEach(k => { if (k.startsWith('sp_')) localStorage.setItem(k, data[k] || "[]"); });
                        alert("Backup restored! The app will now reload.");
                        window.location.reload();
                    } catch (err) { alert("Invalid backup file format."); }
                };
                reader.readAsText(file);
            };

            return e('div', null,
                e(PageTitle, { sub: "Preferences, security, and data management." }, 'Settings'),
                e(InsightStrip, { totals, bills, budgets, fc }),

                e('div', { className: "dashboard-grid" },
                    // LEFT COLUMN
                    e('div', null,
                        e(SettingGroup, { title: "Appearance", icon: "grid" },
                            e(Field, { label: "Theme" }, e(Sel, { value: settings?.theme || 'dark', onChange: ev => setSettings({...settings, theme: ev.target.value}) },
                                e('option', { value: "dark" }, "🌙 Dark Mode"),
                                e('option', { value: "light" }, "☀️ Light Mode")
                            )),
                            e(Field, { label: "Currency" }, e(Sel, { value: settings?.currency || 'PHP', onChange: ev => setSettings({...settings, currency: ev.target.value}) },
                                Object.keys(CURRENCIES).map(c => e('option', { key: c, value: c }, c))
                            ))
                        ),

                        e(SettingGroup, { title: "Security", icon: "lock" },
                            e('p', { style: { fontSize:13, color:"var(--text-muted)", marginBottom:16, lineHeight:1.5 } },
                                settings?.pin ? "PIN is active. Clear the field and save to disable." : "Add a numeric PIN to lock the app on open."
                            ),
                            e(Field, { label: "PIN (leave blank to disable)" },
                                e(Inp, { type: "password", inputMode: "numeric", pattern: "[0-9]*", placeholder: "e.g. 1234", value: pinInput, onChange: ev => setPinInput(ev.target.value.replace(/[^0-9]/g, '')) })
                            ),
                            e(Btn, { v: "accent", onClick: () => { setSettings({...settings, pin: pinInput}); showToast(pinInput ? "✓ PIN saved." : "✓ PIN removed."); } }, pinInput ? "Save PIN" : "Remove PIN")
                        )
                    ),

                    // RIGHT COLUMN
                    e('div', null,
                        e(SettingGroup, { title: "Data Backup", icon: "archive" },
                            e('p', { style: { fontSize:13, color:"var(--text-muted)", marginBottom:16, lineHeight:1.5 } },
                                "All data lives in your browser. Export regularly — clearing browser storage will erase everything."
                            ),
                            e(Btn, { v: "primary", style: { width:"100%", marginBottom:10 }, onClick: handleExport },
                                "⬇ Export Backup (.json)"
                            ),
                            e('div', { style: { borderTop:"1px solid var(--border)", paddingTop:16, marginTop:6 } },
