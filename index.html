            camera:      "M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z M12 17a4 4 0 100-8 4 4 0 000 8z",
            image:       "M21 19V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2z M8.5 10a1.5 1.5 0 100-3 1.5 1.5 0 000 3z M21 15l-5-5L5 21",

        function Icon({ name, size = 18, color = "currentColor", style: st = {} }) {
            const path = ICONS[name] || ICONS.target;
            return e('svg', { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", style: { flexShrink: 0, ...st } },
                ...path.split(" M").map((seg, i) => e('path', { key: i, d: (i === 0 ? "" : "M") + seg }))
            );
        }

        // Vault icon system — Lucide only, no emoji
        const FUND_ICONS = [
            { id: "landmark",    label: "Savings" },
            { id: "shield",      label: "Emergency" },
            { id: "plane",       label: "Travel" },
            { id: "briefcase",   label: "Business" },
            { id: "smartphone",  label: "Gadget" },
            { id: "utensils",    label: "Food" },
            { id: "receipt",     label: "Bills" },
            { id: "shoppingbag", label: "Shopping" },
            { id: "car",         label: "Vehicle" },
            { id: "home2",       label: "Housing" },
            { id: "gift",        label: "Gift" },
            { id: "trendingup",  label: "Investment" },
        ];
        // Fallback: if a saved fund still has an emoji, map to landmark
        const resolveVaultIcon = (iconId) => FUND_ICONS.find(x => x.id === iconId) ? iconId : "landmark";
        const CATEGORIES = ["Food", "Gas", "Bills", "Business", "Personal", "Savings"];
        const CURRENCIES = {
            "PHP": { style: "currency", currency: "PHP" },
            "USD": { style: "currency", currency: "USD" },
            "EUR": { style: "currency", currency: "EUR" },
            "GBP": { style: "currency", currency: "GBP" },
            "JPY": { style: "currency", currency: "JPY", minimumFractionDigits: 0 }
        };

        // Approximate exchange rates relative to PHP (for secondary currency display)
        const EXCHANGE_RATES = {
            "PHP": 1,
            "USD": 0.018,
            "EUR": 0.016,
            "GBP": 0.014,
            "JPY": 2.65
        };

        // ── RESOLVE GLOBALS ───────────────────────────────────────────────────
        // Pull utils, UI primitives and external components from their own files.
        // Keeps this file thin; avoids re-defining what is already loaded.
        const { tc, uid, todayStr, safeDiv, addMonths, getDaysRemaining } = window.utils;
        const { SLabel, PageTitle, PBar, Field, Inp, Sel, Btn } = window.components;
        const EmptyState = window.EmptyState;



        // ── VIRTUAL LIST — renders only visible items for performance ────────
        function VirtualList({ items, itemHeight = 60, overscan = 5, renderItem, emptyContent }) {
            const containerRef = useRef(null);
            const [scrollTop, setScrollTop] = useState(0);
            const [containerHeight, setContainerHeight] = useState(600);

            useEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const observer = new ResizeObserver(entries => {
                    setContainerHeight(entries[0].contentRect.height);
                });
                observer.observe(el);
                return () => observer.disconnect();
            }, []);

            const totalHeight = items.length * itemHeight;
            const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - overscan);
            const endIndex = Math.min(items.length, Math.ceil((scrollTop + containerHeight) / itemHeight) + overscan);
            const visibleItems = items.slice(startIndex, endIndex);

            if (items.length === 0 && emptyContent) return emptyContent;

            return e('div', {
                ref: containerRef,
                onScroll: ev => setScrollTop(ev.target.scrollTop),
                style: { overflow: "auto", position: "relative" }
            },
                e('div', { style: { height: totalHeight, position: "relative" } },
                    visibleItems.map((item, i) =>
                        e('div', {
                            key: item.id || startIndex + i,
                            style: { position: "absolute", top: (startIndex + i) * itemHeight, left: 0, right: 0 }
                        }, renderItem(item, startIndex + i))
                    )
                )
            );
        }

        function DotMenu({ itemId, openMenu, setOpenMenu, onEdit, onDelete }) {
            const isOpen = openMenu === itemId;
            return e('div', { style: { position: "relative", flexShrink: 0 } },
                isOpen && e('div', { style: { position: "fixed", inset: 0, zIndex: Z.MENU_BACKDROP }, onClick: (ev) => { ev.stopPropagation(); setOpenMenu(null); } }),
                e('button', { className: "dot-menu-btn", onClick: (ev) => { ev.stopPropagation(); setOpenMenu(isOpen ? null : itemId); } }, '⋮'),
                isOpen && e('div', { className: "dot-menu-dropdown" },
                    e('button', { className: "dot-menu-item", onClick: (ev) => { ev.stopPropagation(); setOpenMenu(null); onEdit(); } },
                        e('span', { style: { display:"flex", alignItems:"center", gap:8 } }, e(Icon, { name:"edit", size:14 }), "Edit")),
                    e('button', { className: "dot-menu-item", style: { color: "#EF4444" }, onClick: (ev) => { ev.stopPropagation(); setOpenMenu(null); onDelete(); } },
                        e('span', { style: { display:"flex", alignItems:"center", gap:8 } }, e(Icon, { name:"trash", size:14, color:"#EF4444" }), "Delete"))

        // ── WALLET HELPERS ─────────────────────────────────────────────────────
        const WALLET_COLORS = ["#00E676","#3B82F6","#A855F7","#F59E0B","#EF4444","#10B981","#EC4899","#64748B"];
        const CASH_WALLET_ID = "sp-cash";
        const CASH_WALLET    = { id: CASH_WALLET_ID, name: "Cash", openingBalanceCents: 0, color: "#00E676" };
        // Optional wallet selector for expenses (kept for backwards compat)
        function WalletPicker({ wallets, value, onChange }) {
            if (!wallets || wallets.length === 0) return null;
            const { WalletIcon } = window.walleticons;
            return e('div', { style: { display: "flex", flexWrap: "wrap", gap: 8 } },
                wallets.map(w => {
                    const selected = value === w.id;
                    return e('button', { key: w.id, onClick: () => onChange(w.id), style: {
                        display: "flex", alignItems: "center", gap: 8,
                        padding: "8px 12px 8px 8px", borderRadius: 10,
                        background: selected ? "rgba(0,230,118,0.10)" : "var(--bg-input)",

                        )
                    );

            );

        // ── INCOME SOURCE PICKER ───────────────────────────────────────────────
        // Always renders. Defaults to Cash. Supports inline quick-create.
        function IncomeSourcePicker({ wallets, setWallets, value, onChange, showToast }) {
            const [showCreate, setShowCreate] = useState(false);
            const [newName, setNewName]       = useState("");
            const [newColor, setNewColor]     = useState(WALLET_COLORS[1]);

            const handleCreate = () => {
                if (!newName.trim()) return;
                // Enforce tier limit — wallets here is displayWallets; use length as proxy count
                const canAdd = window.license ? window.license.canAddItem("wallets", wallets.length) : (wallets.length < 3);
                if (!canAdd) {
                    setShowCreate(false);
                    setNewName("");
                    if (showToast) showToast("Free limit reached (3 wallets). Upgrade to Premium for unlimited.");
                    return;
                }
                const w = { id: uid(), name: newName.trim(), openingBalanceCents: 0, color: newColor };
                setWallets(prev => [...prev, w]);
                onChange(w.id);
                setNewName(""); setShowCreate(false);
            };

            const safeWallets = (wallets || []);
            const { WalletIcon } = window.walleticons;

            return e('div', { style: { marginBottom: 8 } },
                e('div', { style: { fontSize: 12, fontWeight: 600, color: "var(--text-light)", marginBottom: 8, letterSpacing: "0.03em" } }, "Receiving Source"),
                e('div', { style: { display: "flex", flexWrap: "wrap", gap: 8 } },
                    safeWallets.map(w => e('button', { key: w.id, onClick: () => onChange(w.id), style: {
                        display: "flex", alignItems: "center", gap: 8,
                        padding: "8px 12px 8px 8px", borderRadius: 10,
                        background: value === w.id ? "rgba(0,230,118,0.12)" : "var(--bg-input)",
                        border: `1px solid ${value === w.id ? "#00E676" : "var(--border-input)"}`,
                        color: value === w.id ? "#00E676" : "var(--text-main)",
                        fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s"
                    } },
                        e(WalletIcon, { name: w.name, color: w.color || "#00E676", size: 24, radius: 7 }),
                        w.name
                    )),
                    // Only show "+ New Source" if the wallet limit hasn't been reached
                    (window.license ? window.license.canAddItem("wallets", safeWallets.length) : safeWallets.length < 3) &&
                    e('button', { onClick: () => setShowCreate(!showCreate), style: {
                        padding: "8px 14px", borderRadius: 10,
                        background: "transparent",
                        border: "1px dashed var(--border-input)",
                        color: showCreate ? "var(--text-muted)" : "var(--text-light)",
                        fontSize: 13, fontWeight: 600, cursor: "pointer"
                    } }, showCreate ? "✕ Cancel" : "+ New Source")
                ),
                showCreate && e('div', { style: {
                    marginTop: 10, padding: "12px 14px", borderRadius: 10,
                    background: "var(--bg-input)", border: "1px solid var(--border-input)",
                    display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap"
                } },
                    e(Inp, { autoFocus: true, placeholder: "e.g. GCash, BPI, Maya", value: newName,
                        onChange: ev => setNewName(ev.target.value),
                        onKeyDown: ev => ev.key === "Enter" && handleCreate(),
                        style: { flex: 1, minWidth: 140, marginBottom: 0 }
                    }),
                    e('div', { style: { display: "flex", gap: 4, flexShrink: 0 } },
                        WALLET_COLORS.slice(0, 6).map(c => e('button', { key: c, onClick: () => setNewColor(c), style: {
                            width: 20, height: 20, borderRadius: "50%", background: c, padding: 0, cursor: "pointer",
                            border: newColor === c ? "2px solid var(--text-main)" : "2px solid transparent"

                    e(Btn, { v: "accent", style: { padding: "10px 16px", fontSize: 12, flexShrink: 0 }, onClick: handleCreate }, "Add")

        // ── MODULE: WALLETS ────────────────────────────────────────────────────
        const WalletsView = React.memo(function WalletsView({ wallets, rawWallets, setWallets, incomes, dailyExpenses, txns, fc, requestConfirm, showToast }) {
            const [modal, setModal] = useState(false);
            const [form, setForm] = useState({ name: "", balanceCents: "", color: WALLET_COLORS[0] });
            const [editWallet, setEditWallet] = useState(null);
            const [editForm, setEditForm] = useState({ name: "", color: WALLET_COLORS[0] });
            const [openMenu, setOpenMenu] = useState(null);

            // Per-wallet this-month flow — derived from live records, never stored separately
            const walletFlow = (wId) => {
                const inc  = (incomes || []).filter(i => i.walletId === wId).reduce((s, i) => s + i.amountCents, 0);
                const exp  = (dailyExpenses || []).filter(d => d.walletId === wId).reduce((s, d) => s + d.amountCents, 0);
                const bill = (txns || []).filter(t => t.walletId === wId && t.type === "bill_payment").reduce((s, t) => s + t.amountCents, 0);
                return { inc, out: exp + bill };
            };

            const handleCreate = () => {
                if (!form.name) return;
                // Enforce tier limit via license system
                const canAdd = window.license ? window.license.canAddItem("wallets", rawWallets.length) : (rawWallets.length < 3);
                if (!canAdd) {
                    showToast("Free limit reached (3 wallets). Upgrade to Premium for unlimited.");
                    setModal(false);

        // ── PIN SCREEN ──────────────────────────────────────────────────────────
        function PinScreen({ targetPin, onUnlock }) {
            const [input, setInput] = useState("");
            const [error, setError] = useState(false);
            const [attempts, setAttempts] = useState(0);
            const [lockedUntil, setLockedUntil] = useState(0);
            const [lockMsg, setLockMsg] = useState("");

            const isLocked = Date.now() < lockedUntil;

            const handleAttempt = () => {
                if (isLocked) return;
                if (input.length < 4) { setError(true); setTimeout(() => setError(false), 1000); return; }

                const onSuccess = () => onUnlock();
                const onFail = () => {
                    const newAttempts = attempts + 1;
                    setAttempts(newAttempts);
                    setError(true); setInput("");
                    setTimeout(() => setError(false), 1000);
                    if (newAttempts >= 5) {
                        const delay = Math.min(30000, 1000 * Math.pow(2, newAttempts - 5));
                        setLockedUntil(Date.now() + delay);
                        setLockMsg(`Too many attempts. Wait ${Math.ceil(delay / 1000)}s.`);
                        setTimeout(() => { setLockMsg(""); }, delay);
                    }
                };

                var isHashed = /^[0-9a-f]{64}$/.test(targetPin);
                if (isHashed) {
                    window.hashPin(input).then(function (hashed) {
                        if (hashed === targetPin) onSuccess();
                        else onFail();
                    });
                } else {
                    if (input === targetPin) onSuccess();
                    else onFail();
                }
            };

                // Logo

        // ── IMAGE COMPRESSION UTILITY ─────────────────────────────────────────
        // Resizes to max 900px and converts to JPEG @72% quality (~30–80KB output)
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onerror = reject;
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onerror = reject;
                    img.onload = () => {
                        const MAX = 900;
                        const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
                        const w = Math.round(img.width * ratio);
                        const h = Math.round(img.height * ratio);
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.72));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

                const diff = Math.round((new Date(todayStr()) - dt) / 86400000);
                if (diff === 0) return "Today";

        // ── CORE APPLICATION ──────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("dashboard");

            useEffect(() => { window.scrollTo(0, 0); }, [tab]);

            const saved = window.persistence.loadState();
            const defaultSettings = { currency: 'PHP', secondaryCurrency: '', theme: 'dark', pin: '' };
            const [settings, setSettings] = useState(() => ({ ...defaultSettings, ...saved.settings }));
            const [isUnlocked, setIsUnlocked] = useState(!settings.pin);

            const [funds, setFunds] = useState(saved.funds);
            const [txns, setTxns] = useState(saved.txns);
            const [incomes, setIncomes] = useState(saved.incomes);
            const [bills, setBills] = useState(saved.bills);
            const [dailyExpenses, setDailyExpenses] = useState(saved.daily);
            const [archives, setArchives] = useState(saved.archives);
            const [budgets, setBudgets] = useState(saved.budgets);
            const [photoDiary, setPhotoDiary] = useState([]);
            const [photoDiaryLoaded, setPhotoDiaryLoaded] = useState(false);

            // Load photo diary from IndexedDB on mount, with localStorage migration
            useEffect(() => {
                window.photodb.open().then(() => {
                    return window.photodb.migrateFromLS();
                }).then(() => {
                    return window.photodb.getAll();
                }).then(entries => {
                    setPhotoDiary(entries || []);
                    setPhotoDiaryLoaded(true);
                }).catch(err => {
                    console.warn("[app] IndexedDB photo load failed, falling back to localStorage:", err);
                    try { setPhotoDiary(JSON.parse(localStorage.getItem("sp_photo_diary")) || []); } catch { setPhotoDiary([]); }
                    setPhotoDiaryLoaded(true);
                });
            }, []);
            const [wallets, setWallets] = useState(() => {
                const w = saved.wallets;
                const withCash = w.find(x => x.id === CASH_WALLET_ID) ? w : [CASH_WALLET, ...w];
                return window.finance.migrateWallets(withCash, { incomes, bills, dailyExpenses, txns });
            });

            // Sync states to LocalStorage & Apply Theme
            useEffect(() => {
                window.persistence.saveKey("settings", settings);
                document.documentElement.setAttribute('data-theme', settings.theme);
            }, [settings]);
            useEffect(() => { window.persistence.saveKey("funds", funds); }, [funds]);
            useEffect(() => { window.persistence.saveKey("txns", txns); }, [txns]);
            useEffect(() => { window.persistence.saveKey("incomes", incomes); }, [incomes]);
            useEffect(() => { window.persistence.saveKey("bills", bills); }, [bills]);
            useEffect(() => { window.persistence.saveKey("daily", dailyExpenses); }, [dailyExpenses]);
            useEffect(() => { window.persistence.saveKey("archives", archives); }, [archives]);
            useEffect(() => { window.persistence.saveKey("budgets", budgets); }, [budgets]);
            // Persist photo diary to IndexedDB (not localStorage — too large for photos)
            useEffect(() => {
                if (!photoDiaryLoaded) return; // skip initial empty state before IDB loads
                // Debounce: only save after 300ms of no changes
                const timer = setTimeout(() => {
                    window.photodb.saveAll(photoDiary).catch(err => {
                        console.warn("[app] IndexedDB photo save failed:", err);
                        // Fallback: try localStorage (may hit quota)
                        try { localStorage.setItem("sp_photo_diary", JSON.stringify(photoDiary)); } catch(e) { /* quota exceeded */ }
                    });
                }, 300);
                return () => clearTimeout(timer);
            }, [photoDiary, photoDiaryLoaded]);
            useEffect(() => { window.persistence.saveKey("wallets", wallets); }, [wallets]);

            // Currency Formatter bound to state
            const fc = useMemo(() => {
                return (c) => new Intl.NumberFormat("en-PH", CURRENCIES[settings.currency] || CURRENCIES.PHP).format((Number(c) || 0) / 100);
            }, [settings.currency]);

            // Secondary currency formatter (optional)
            const fc2 = useMemo(() => {
                if (!settings.secondaryCurrency || settings.secondaryCurrency === settings.currency) return null;
                const rate = (EXCHANGE_RATES[settings.secondaryCurrency] || 1) / (EXCHANGE_RATES[settings.currency] || 1);
                return (c) => new Intl.NumberFormat("en-PH", CURRENCIES[settings.secondaryCurrency] || CURRENCIES.PHP).format(((Number(c) || 0) / 100) * rate);
            }, [settings.currency, settings.secondaryCurrency]);

            const displayWallets = useMemo(() => {
                return window.finance.deriveWallets(wallets, { incomes, bills, dailyExpenses, txns });
            }, [wallets, incomes, bills, dailyExpenses, txns]);

            const totals = useMemo(
                () => window.selectors.computeTotals({ incomes, bills, funds, txns, dailyExpenses }),
                [incomes, bills, funds, txns, dailyExpenses]
            );

            // ── CLOSE MONTH (hook must be before any conditional return) ────
            const [showCloseModal, setShowCloseModal] = useState(false);
            const [showMoreSheet, setShowMoreSheet] = useState(false);
            const [showQuickAdd, setShowQuickAdd]   = useState(false);
            const [showUtilMenu, setShowUtilMenu]   = useState(false);
            const [toast, setToast] = useState(null);
            const toastTimer = useRef(null);
            const showToast = useCallback((msg) => {
                if (toastTimer.current) clearTimeout(toastTimer.current);
                setToast(msg);
                toastTimer.current = setTimeout(() => setToast(null), 2600);
            }, []);

            // ── CONFIRM DIALOG ───────────────────────────────────────────────────
            const [confirmState, setConfirmState] = useState(null);
            const requestConfirm = useCallback((message, onConfirm) => {
                setConfirmState({ message, onConfirm });
            }, []);

            if (!isUnlocked) return e(PinScreen, { targetPin: settings.pin, onUnlock: () => setIsUnlocked(true) });

            const handleCloseMonth = () => {
                const now = new Date();
                const monthLabel = now.toLocaleDateString("en-PH", { month: "long", year: "numeric" });
                // FIX #4: use totals.* directly instead of recalculating
                const totalIncome  = totals.totalIncome;
                const totalBills   = totals.paidBills;
                const totalSpent   = totals.totalDailySpent;
                const totalSavings = totals.totalInGoals;
                const remaining    = totals.netAvailable;

                const archive = {
                    id: uid(),
                    month: monthLabel,
                    closedAt: now.toISOString(),
                    totalIncome, totalSpent, totalBills, totalSavings, remaining,
                    snapshot: {
                        incomes: [...incomes],
                        bills:   [...bills],
                        dailyExpenses: [...dailyExpenses],
                        funds: [...funds],
                        txns:  [...txns],
                        wallets: [...displayWallets]
                    }
                };

                setArchives(prev => [archive, ...prev]);
                setWallets(displayWallets.map(w => {
                    const activeVaultTxns = txns.filter(t => t.fundId);
                    const vaultDelta = window.finance.getWalletDelta(w.id, { txns: activeVaultTxns });
                    return { ...w, openingBalanceCents: (w.balanceCents || 0) - vaultDelta };
                }));
                setTxns(prev => prev.filter(t => t.fundId));
                // Copy recurring expenses to new month (preserve photo diary links)
                const recurringExpenses = dailyExpenses.filter(e => e.recurring && e.recurring !== "none").map(e => {
                    const newId = uid();
                    // Update linked photo diary entry's expenseId to match new expense
                    if (e.fromDiary) {
                        setPhotoDiary(prev => prev.map(p =>
                            p.expenseId === e.id ? { ...p, expenseId: newId } : p
                        ));
                    }
                    return { ...e, id: newId, date: todayStr() };
                });
                setDailyExpenses(recurringExpenses);
                setIncomes([]);
                // FIX #2: advance dueDate for recurring bills, then reset isPaid
                setBills(prev => prev.map(b => {
                    let nextDue = b.dueDate;
                    if (b.recurring === "monthly" && b.dueDate) {
                        nextDue = addMonths(b.dueDate, 1);
                    } else if (b.recurring === "weekly" && b.dueDate) {
                        const d = new Date(b.dueDate + "T00:00:00");
                        d.setDate(d.getDate() + 7);
                        nextDue = d.toISOString().slice(0, 10);
                    }
                    return { ...b, isPaid: false, paidTxnId: null, paidWalletId: null, dueDate: nextDue };
                }));
                setShowCloseModal(false);
                showToast("✓ Month archived. Fresh start!");
            };

            return e('div', null,
                e('div', { style: { background: "var(--bg-panel)", borderBottom: "1px solid var(--border)", position: "sticky", top: 0, zIndex: Z.STICKY_HEADER } },

                    // ── ROW 1: Logo + Action Buttons ──────────────────────────

                        e('div', { style: S.row10 },
                            e('img', { src: "logosinkpeso.png", alt: "Logo", style: { height: 30, width: "auto", objectFit: "contain" } }),
                            e('div', { style: { fontWeight: 900, color: "#FFFFFF", fontSize: 16 }, className: "nav-logo-text" }, 'SINKPESO')
                        ),
                        e('div', { style: { display: "flex", gap: 6, alignItems: "center", flexShrink: 0 } },

                            // ── UTILITY KEBAB MENU ─────────────────────────────────────
                            e('div', { style: { position: "relative" } },
                                // Backdrop to close on outside click
                                showUtilMenu && e('div', {
                                    style: { position: "fixed", inset: 0, zIndex: Z.MENU_BACKDROP },
                                    onClick: () => setShowUtilMenu(false)
                                }),
                                // Three-dot trigger
                                e('button', {
                                    onClick: () => setShowUtilMenu(!showUtilMenu),
                                    title: "More actions",
                                    className: "util-menu-btn",
                                    style: {
                                        background: showUtilMenu ? "var(--hover-bg)" : "transparent",
                                        border: "1px solid rgba(255,255,255,0.09)",
                                        color: showUtilMenu ? "var(--text-main)" : "var(--text-muted)",
                                        width: 34, height: 34, borderRadius: 8,
                                        cursor: "pointer", display: "flex",
                                        alignItems: "center", justifyContent: "center",
                                        transition: "all 0.15s", flexShrink: 0,
                                    },
                                },
                                    e(Icon, { name: "more", size: 16 })
                                ),
                                // Dropdown panel
                                showUtilMenu && e('div', {
                                    style: {
                                        position: "absolute", right: 0, top: "calc(100% + 6px)",
                                        background: "var(--bg-panel)",
                                        border: "1px solid var(--border)",
                                        borderRadius: 12, padding: 4,
                                        zIndex: Z.MENU_DROPDOWN, minWidth: 178,
                                        boxShadow: "0 8px 28px rgba(0,0,0,0.45)",
                                    }
                                },
                                    e('button', {
                                        className: "dot-menu-item",
                                        onClick: () => { setShowUtilMenu(false); setShowCloseModal(true); },
                                        style: { display: "flex", alignItems: "center", gap: 10, color: "var(--text-main)" }
                                    },
                                        e(Icon, { name: "archive", size: 14, color: "var(--text-muted)" }),
                                        "Archive Month"
                                    ),
                                    settings.pin && e('button', {
                                        className: "dot-menu-item",
                                        onClick: () => { setShowUtilMenu(false); setIsUnlocked(false); },
                                        style: { display: "flex", alignItems: "center", gap: 10, color: "var(--text-main)" }
                                    },
                                        e(Icon, { name: "lock", size: 14, color: "var(--text-muted)" }),
                                        "Lock App"
                                    )
                                )
                            ),

                            e('button', { 
                                onClick: () => setTab("settings"), title: "Settings",
                                style: { ...S.iconBtn, background: tab === "settings" ? "var(--hover-bg)" : "transparent", color: tab === "settings" ? "var(--text-main)" : "var(--text-muted)" }
                            }, e(Icon, { name: "settings", size: 16 }))
                        )
                    ),

                    // ── ROW 2: Nav Tabs — Primary + Secondary ─────────────────
                    e('div', { className: "nav-scroll desktop-tabs", style: { display: "flex", alignItems: "center", overflowX: "auto", padding: "0 12px 0", borderTop: "1px solid var(--border)" } },

                        // Primary tabs
                        [
                            { id: "dashboard",   label: "Dashboard" },
                            { id: "budget",      label: "Bills & Income" },
                            { id: "daily",       label: "Daily Expenses" },
                            { id: "goals",       label: "Savings Vaults" },
                            { id: "photo-diary", label: "Photo Diary" },
                        ].map(t => e('button', {

                        }, t.label)),

                        [

                            { id: "transactions", label: "Logs" },
                            { id: "history",      label: "History" },

                            style: { background: "transparent", color: tab === t.id ? "var(--text-light)" : "var(--text-muted)", border: "none", borderBottom: tab === t.id ? "2px solid rgba(148,163,184,0.6)" : "2px solid transparent", padding: "12px 12px", cursor: "pointer", fontSize: 12, fontWeight: tab === t.id ? 600 : 400, whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.18s", opacity: tab === t.id ? 1 : 0.7 }

                e('div', { className: "page-wrap", style: { maxWidth: 1140, margin: "0 auto", padding: "clamp(16px, 4vw, 32px) clamp(12px, 4vw, 24px) 80px" } },
                    tab === "dashboard" && e(DashboardOverview, { totals, bills, dailyExpenses, budgets, wallets: displayWallets, fc, fc2, incomes, txns, funds, archives, photoDiary, onNavigate: setTab }),
                    tab === "limits" && e(BudgetLimitsView, { budgets, setBudgets, fc, requestConfirm }),
                    tab === "wallets" && e(WalletsView, { wallets: displayWallets, rawWallets: wallets, setWallets, incomes, dailyExpenses, txns, fc, requestConfirm, showToast }),
                    tab === "budget" && e(BudgetBillsView, { incomes, setIncomes, bills, setBills, wallets: displayWallets, setWallets, txns, setTxns, fc, requestConfirm, showToast }),

                    tab === "history" && e(HistoryView, { archives, fc }),
                    tab === "photo-diary" && e(PhotoDiaryView, { photoDiary, setPhotoDiary, dailyExpenses, setDailyExpenses, wallets: displayWallets, setWallets, fc, showToast, requestConfirm }),
                    tab === "settings" && e(SettingsView, { settings, setSettings, setIncomes, setBills, setDailyExpenses, setFunds, setTxns, setArchives, setBudgets, showToast, totals, bills, budgets, fc }),

e('footer', { 
                    style: { 
                        textAlign: "center", padding: "40px 20px", marginTop: "40px",

                    } 
                },

                    e('div', { style: { fontSize: 10, color: "var(--text-muted)", opacity: 0.3, marginTop: 4 } }, "v2.0"),
                    e('div', { style: { opacity: 0.5, fontSize: 11 } }, "Private offline finance tracking · No account required.")

                    const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);

                    blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });

                            if (!password) { showToast("Password required for encrypted backup."); return; }
                            const enc = new TextEncoder();
                            const salt = new Uint8Array(raw.salt);
                            const iv = new Uint8Array(raw.iv);
                            const encrypted = new Uint8Array(raw.data);
                            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
                            const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);

                    e('h3', { style: { marginBottom: 8 } }, "Edit Vault Transaction"),
                    e('p', { style: { fontSize: 13, color: "var(--text-muted)", marginBottom: 20 } }, `Vault: ${getVaultName(editTxn.fundId)}`),
                    e(Field, { label: "Transaction Type" }, e(Sel, { value: editTxnForm.type, onChange: ev => setEditTxnForm({ ...editTxnForm, type: ev.target.value }) },

        // ── COMPONENT: RECENT ACTIVITY SECTION (Dashboard) ──────────────────────
        function RecentActivitySection({ incomes, dailyExpenses, bills, txns, funds, wallets, archives, fc, onNavigate }) {
            const relTime = (dateStr) => {
                if (!dateStr) return "";
                const today = new Date().toISOString().slice(0, 10);
                if (dateStr === today) return "Today";
                const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                if (dateStr === yesterday) return "Yesterday";
                const diffDays = Math.floor((new Date(today) - new Date(dateStr)) / 86400000);
                if (diffDays < 7) return `${diffDays}d ago`;
                if (diffDays < 30) return `${Math.floor(diffDays / 7)}w ago`;
                return `${Math.floor(diffDays / 30)}mo ago`;
            };

            const activities = useMemo(() =>
                window.selectors.getRecentActivities({ dailyExpenses, incomes, txns, bills, funds, wallets, archives }),
            [incomes, dailyExpenses, bills, txns, funds, wallets, archives]);

                    activities.length > 0 && e('button', {

                            e('div', { style: { fontSize: 10, color: "var(--text-muted)", marginTop: 2 } }, relTime(item.date))

        }

            const [detailTab, setDetailTab] = useState("income");

            const statBox = (label, value, color) => e('div', { style: S.statCard },
                e('div', { style: S.label }, label),
                e('div', { style: { fontSize: 20, fontWeight: 800, color, marginTop:6 } }, value));

            // Chart Data Prep
            const chartData = useMemo(() => [...archives].reverse().slice(-6), [archives]);
            const maxVal = Math.max(1, ...chartData.flatMap(a => [a.totalIncome, a.totalSpent]));

                        e(Icon, { name: "calendar", size: 44, color: "var(--text-muted)" })
                    ),
                    e('div', { style: { fontWeight: 700, fontSize: 15, marginBottom: 8, color: "var(--text-light)" } }, "No archived months yet"),
                    e('div', { style: { fontSize: 13, lineHeight: 1.6, maxWidth: 280, margin: "0 auto" } }, 'Use "Archive & Start New Month" at the end of each month to save a snapshot and start fresh.')
                ) :
                e('div', { className: "premium-panel" },
                    e(SLabel, { style: { marginBottom: 12 } }, "Archive Ledgers"),
                    archives.map(arc => {

                    })
                ),

                selected && e('div', { className: "modal-overlay", onClick: () => setSelected(null) },
                    e('div', { className: "modal-container", style: { maxWidth: 560, maxHeight: "85vh", overflowY: "auto" }, onClick: ev => ev.stopPropagation() },
                        e('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 } }, e('div', null, e('h3', { style: { fontSize: 20, fontWeight: 800, color: "var(--text-main)" } }, selected.month), e('div', { style: { fontSize: 12, color: "var(--text-muted)", marginTop: 4 } }, `Closed ${fmt(selected.closedAt)}`)), e('button', { onClick: () => setSelected(null), style: S.closeBtn }, e(Icon, { name: "x", size: 16 }))),
                        e('div', { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 24 } }, statBox("Total Income", fc(selected.totalIncome), "var(--text-main)"), statBox("Total Spent", fc(selected.totalSpent), "#EF4444"), statBox("Bills Paid", fc(selected.totalBills), "#A855F7"), statBox("In Savings", fc(selected.totalSavings), "#10B981")),
                        e('div', { style: { display: "flex", gap: 6, marginBottom: 18, background: "var(--hover-bg)", borderRadius: 12, padding: 4 } },
                            ["income", "bills", "expenses", "wallets"].map(t => e('button', { key: t, onClick: () => setDetailTab(t), style: { flex: 1, background: detailTab === t ? "var(--border)" : "transparent", border: "none", color: detailTab === t ? "var(--text-main)" : "var(--text-muted)", padding: "7px 0", borderRadius: 8, cursor: "pointer", fontSize: 11, fontWeight: 700, textTransform: "capitalize", fontFamily: "inherit" } }, t))
                        ),
                        detailTab === "income" && e('div', null,
                            selected.snapshot.incomes.length === 0
                                ? e('div', { style: { padding: "16px 0", textAlign: "center", fontSize: 13, color: "var(--text-muted)" } }, "No income recorded this month.")
                                : selected.snapshot.incomes.map(i => e('div', { key: i.id, className: "stream-row" }, e('div', null, e('div', { style: { fontWeight: 600 } }, i.name)), e('div', { style: { color: "#00E676", fontWeight: 700 } }, `+${fc(i.amountCents)}`)))
                        ),
                        detailTab === "bills" && e('div', null,
                            selected.snapshot.bills.length === 0
                                ? e('div', { style: { padding: "16px 0", textAlign: "center", fontSize: 13, color: "var(--text-muted)" } }, "No bills recorded this month.")

                                : selected.snapshot.dailyExpenses.map(ex => e('div', { key: ex.id, className: "stream-row" }, e('div', null, e('div', { style: { fontWeight: 600 } }, ex.name), e('div', { style: { fontSize: 11, color: "var(--text-muted)", marginTop: 2 } }, ex.category)), e('div', { style: { fontWeight: 700, color: "#EF4444" } }, `-${fc(ex.amountCents)}`)))

                                    e('div', { style: { display:"flex", alignItems:"center", gap:10 } },
                                        e('div', { style: { width:10, height:10, borderRadius:"50%", background: w.color || "#00E676", flexShrink:0 } }),
                                        e('div', { style: { fontWeight: 600 } }, w.name)
                                    ),
                                    e('div', { style: { fontWeight: 700, color: (w.balanceCents||0) < 0 ? "#EF4444" : "var(--text-main)" } }, fc(w.balanceCents || 0))
                                ))
                        )
                    )
                )
            );
        });

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(e(ErrorBoundary, null, e(App)));
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
